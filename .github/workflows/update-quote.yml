name: 🤖 Daily AI Quote Refresh
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-quote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Pick & inject a new AI quote
        run: python .github/scripts/update_quote.py

      - name: Commit if README changed
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || git commit -m "🤖 Daily AI quote refresh [skip ci]"
          git push
